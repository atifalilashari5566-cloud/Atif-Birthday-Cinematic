<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Atif ❤️ | 20 July</title>

    <link rel="stylesheet" href="Style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- Background -->

<div id="stars"></div>
<div id="moon"></div>
<div id="clouds"></div>
<div id="hearts"></div>
<div id="flowers"></div>
<div id="fireworks"></div>
<div id="confetti"></div>

<!-- Loading -->

<div id="loadingScreen">

    <div class="loader">

        <h1>Happy Birthday ❤️</h1>

        <p>Loading Surprise...</p>

    </div>

</div>

<!-- ========================= -->

<!-- SCENE 1 -->

<!-- ========================= -->

<section id="scene1" class="scene active">

    <div class="glass">

        <h1>🎂 Happy Birthday 🎂</h1>

        <h2>ATIF ❤️</h2>

        <p class="date">

            20 July

        </p>

        <p>

            Today isn't just another day...

            It's the day someone truly special came into this world.

        </p>

        <button id="startBtn">

            Open Your Surprise 🎁

        </button>

    </div>

</section>

<!-- ========================= -->

<!-- SCENE 2 -->

<!-- ========================= -->

<section id="scene2" class="scene">

    <div class="glass gallery">

        <h1>Beautiful Memories ❤️</h1>

        <div class="slider">

            <img src="assets/atif1.jpg.jpeg" class="slide active">

            <img src="assets/atif2.jpg.jpeg" class="slide">

            <img src="assets/atif3.jpg.jpeg" class="slide">
